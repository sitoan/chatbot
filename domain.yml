version: '3.1'
intents:
- greet
- inform
- book_tour
- ask_price
- request_customer_form
- request_tour_form 

forms:
  customer_form:
    required_slots:
      - name
      - phone_number
      - departure_point
      - departure_time
  tour_form:
    required_slots:
      - destination
      - tour_type
      - number_of_people
      - budget
      - duration

entities:
- name
- phone_number
- departure_point
- departure_time
- destination
- tour_type
- number_of_people
- number_of_children
- number_of_adult
- budget
- duration

slots:
  name:
    type: text
    mappings:
    - type: from_entity
      entity: name
  phone_number:
    type: text
    mappings:
    - type: from_entity
      entity: phone_number    
  departure_point:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: departure_point
  departure_time:
    type: text 
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: departure_time
  destination:
    type: text
    influence_conversation: true
    mappings: 
    - type: from_entity
      entity: destination
  tour_type:
    type: categorical
    values:
      - individual
      - group
      - family
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: tour_type
  number_of_adult:
    type: float
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: number_of_adult
  number_of_people:
    type: float
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: number_of_people
  number_of_children:
    type: float
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: number_of_children
  budget:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: budget
  duration:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: duration

responses:
# utter_ask_<slot_name>
  utter_ask_destination:
  - text: "Bạn muốn đi du lịch ở đâu?"
  utter_ask_tour_type:
  - text: "Bạn muốn đi tour cá nhân, gia đình hay theo nhóm?"
  utter_ask_number_of_people:
  - text: "Chuyến đi của bạn có bao nhiêu người?" 
  utter_ask_budget:
  - text: "Ngân sách dự kiến của bạn là bao nhiêu?"
  utter_ask_duration:
  - text: "Bạn muốn đi trong bao lâu?"
  utter_ask_name:
  - text: "Bạn vui lòng cho biết tên?"
  - text: "Xin cho biết tên của bạn?"
  - text: "Bạn tên là gì?"
  utter_ask_phone:
  - text: "Số điện thoại của bạn là gì?"
  - text: "Vui lòng cung cấp số điện thoại liên hệ?"
  - text: "Xin cho biết số điện thoại của bạn?"
  utter_ask_departure_point:
  - text: "Bạn muốn khởi hành từ đâu?"
  - text: "Điểm xuất phát của bạn ở đâu?"
  - text: "Bạn muốn được đón ở đâu?"
  utter_ask_departure_time:
  - text: "Bạn muốn khởi hành lúc mấy giờ?"
  - text: "Thời gian khởi hành bạn mong muốn là?"
  - text: "Bạn muốn đi vào lúc mấy giờ?"
  utter_confirm_customer_form:
  - text: "Cảm ơn bạn đã cung cấp thông tin. Tôi xin xác nhận lại:\nTên: {name}\nSố điện thoại: {phone_number}\nĐiểm đón: {departure_point}\nGiờ đón: {departure_time}"
  utter_greet:
  - text: "Xin chào! Chào mừng bạn đến với dịch vụ tour du lịch của chúng tôi. Bạn cần giúp gì"
  utter_confirm_tour_form:
  - text: "Cảm ơn bạn đã cung cấp thông tin. Tôi xin xác nhận lại:\nĐiểm đến: {destination}\nLoại tour: {tour_type}\nSố người tham gia: {number_of_people}\nNgân sách dự kiến: {budget}\nĐộ dài chuyến đi: {duration}."

actions:
- action_show_tours
- validate_customer_form
- validate_tour_form
- action_show_price


session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
