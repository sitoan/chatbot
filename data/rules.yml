version: "3.1"

rules:
  - rule: respond to greet
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Activate tour form first
    steps:
      - intent: book_tour
      - action: tour_form
      - active_loop: tour_form
        
  - rule: Activate tour form first
    steps:
      - intent: inform
      - action: tour_form
      - active_loop: tour_form
        

  - rule: Submit tour form and activate customer form
    condition:
      - active_loop: tour_form
    steps:
      - action: tour_form
      - active_loop: null
      - slot_was_set:
        - requested_slot: null
      - action: utter_confirm_tour_form
      - action: customer_form
      - active_loop: customer_form


  - rule: Submit customer form
    condition:
      - active_loop: customer_form
    steps:
      - action: customer_form
      - active_loop: null
      - slot_was_set:
        - requested_slot: null
      - action: utter_confirm_customer_form
      - action: action_show_tours
      - action: action_listen

  - rule: respond to price inquiry
    steps:
      - intent: ask_price
      - action: action_show_price
      - action: action_listen