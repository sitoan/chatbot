version: "3.1"

rules:
  - rule: auto greet
    steps:
      - intent: session_start
      - action: action_session_start

  - rule: activate information form
    steps:
    - intent: ask_tours
    - action: information_form
    - active_loop: information_form

  - rule:  submit information form
    condition:
    - active_loop: information_form
    steps:
    - action: information_form
    - active_loop: null
    - slot_was_set: 
      - requested_slot: null
    - action: utter_confirm_info
    - action : action_ask_tours

  - rule: Save available date
    steps:
    - intent: provide_available_date
    - action: action_save_available_date
    - slot_was_set:
        - available_date: "2024-10-12" 
        - valid_date: "false"
    - action: action_confirm_date
    - action: action_show_tour_times

    