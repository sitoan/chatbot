version: "3.1"
nlu:
  
  # Regex cho phone_number
  - regex: phone_number
    examples: |
      - (0|\\+84)[-.]?(3|5|7|8|9)[-.]?[0-9]{3}[-.]?[0-9]{4}[-.]?[0-9]{3}

  # Regex cho duration
  - regex: duration
    examples: |
      - ([0-9]+)\s*(ngày|đêm|N|Đ|tuần|tháng|năm)
      - (một|hai|ba|bốn|năm|sáu|bảy|tám|chín|mười)\s*(ngày|đêm|tuần|tháng)

  # Regex cho number_of_people
  - regex: number_of_people
    examples: |
      - \b([0-9]+|một|hai|ba|bốn|năm|sáu|bảy|tám|chín|mười)\s*(người|khách)\b

  # Regex cho budget
  - regex: budget
    examples: |
      - \b\d+(\.\d+)?\s*(triệu|nghìn|đ|vnđ|usd|k|m|b)\b

  # Regex cho departure_date
  - regex: departure_date
    examples: |
      - \b\d{1,2}[/-]\d{1,2}([/-]\d{4})?\b

  # Synonym cho Hà Nội
  - synonym: Ha Noi
    examples: |
      - ha noi
      - HÀ NỘI
      - Hanoi
      - hn
      - hà nội

  # Synonym cho TP.HCM
  - synonym: Ho Chi Minh City
    examples: |
      - thành phố hồ chí minh
      - tp ho chi minh
      - sài gòn
      - sai gon
      - tphcm
      - hcm
      - thành phố hcm
      - tp.hcm
      - Sài Gòn

  # Intent: greet
  - intent: greet
    examples: |
      - xin chào
      - chào bạn
      - hello
      - hi
      - hey
      - có ai ở đây không
      - chào ad
      - chào admin
      - chào tour du lịch
      - hi, bên đó có tư vấn không?
      - hello mọi người
      - xin chào bạn ơi
      - chào mừng bạn
      - hello anh chị
      - chào ad ơi
      - hi admin
      - hey, có ai ở đây không?
      - xin chào bạn nhé
      - hello, có ai rảnh không?

