version: "3.1"

stories:
  - story: greeting user
    steps:
      - intent: session_start
      - action: action_session_start

  - story: request available date
    steps:
    - intent: request_available_date
    - action: action_save_available_date
    - slot_was_set:
        - available_date: "2024-11-10" 
        - valid_date: "false"
    - action: action_confirm_date
    - action: action_show_tour_times

  - story: User wants to find recent tours
    steps:
      - intent: find_recent_tours
      - action: action_show_recent_tours

  - story: User wants to find recent specific date tours
    steps:
      - intent: find_tours_by_specific_date
      - slot_was_set:
          - month: 11
      - action: action_show_tours_by_specific_date

  - story: find tour by budget
    steps:
      - intent: find_tour_by_budget
      - action: action_show_tours_by_budget

  - story: ask for  days  nights tour
    steps:
    - intent: ask_tour_duration
    - action: action_show_tours_by_specific_duration